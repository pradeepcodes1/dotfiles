# Dotfiles Logging Configuration
# Sourced by shell, read by Lua/Go implementations
# View logs with: dotlog (uses lnav)

# Log file location (JSON Lines format)
DOTFILES_LOG_DIR="${XDG_STATE_HOME:-$HOME/.local/state}/dotfiles/logs"
DOTFILES_LOG_FILE="${DOTFILES_LOG_DIR}/dotfiles.jsonl"

# Log rotation settings (used by shell-side rotation in 00-logging.zsh)
DOTFILES_LOG_MAX_SIZE_MB=10
DOTFILES_LOG_MAX_FILES=5
DOTFILES_LOG_MAX_AGE_DAYS=30
